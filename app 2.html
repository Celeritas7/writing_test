<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Worksheet Generator · Written Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--ink:#14202c;--soft:#3a4a5a;--mute:#6b7c8c;--line:#cfd9e4;--accent:#0e7c9b;--accent2:#b5532a;
        --paper:#ffffff;--grid:rgba(20,90,130,0.07);--panel:#f3f7fb;}
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:"IBM Plex Sans",sans-serif;color:var(--ink);background:#e9eef3;font-size:16px;line-height:1.6;}
  .wrap{max-width:900px;margin:0 auto;padding:18px;}
  h1{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-0.5px;margin:0;font-size:28px;}
  .kicker{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);}
  .btn{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;border:1px solid var(--accent);
       background:var(--accent);color:#fff;border-radius:6px;padding:9px 16px;cursor:pointer;}
  .btn.ghost{background:#fff;color:var(--accent);}
  .btn:hover{filter:brightness(1.06);}
  input,select,textarea{font-family:"IBM Plex Sans",sans-serif;font-size:14px;color:var(--ink);
       border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:#fff;}
  label{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);display:block;margin-bottom:4px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin:14px 0;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
  .row > div{flex:1;min-width:130px;}
  .msg{font-family:"IBM Plex Mono",monospace;font-size:12.5px;margin-top:8px;}
  .msg.ok{color:#0a7d4f;} .msg.err{color:#b3261e;}
  .hide{display:none !important;}
  .pill{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:11px;border:1px solid var(--line);
        border-radius:999px;padding:3px 10px;color:var(--soft);margin-right:6px;}
  /* ---- worksheet (printable) ---- */
  #sheet{background:var(--paper);}
  .page{background:var(--paper);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
        background-size:22px 22px;border:1px solid var(--line);border-radius:8px;padding:30px 34px;margin:16px 0;min-height:840px;position:relative;}
  .ph{display:flex;align-items:baseline;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:6px;}
  .ph .no{font-family:"Archivo",sans-serif;font-weight:800;font-size:30px;color:var(--accent);}
  .ph .tag{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);}
  .ph .sub{margin-left:auto;font-family:"Archivo",sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:-0.3px;}
  .prompt{font-size:17px;margin:14px 0 12px;}
  .given{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--accent);border:1px solid var(--line);
         border-radius:4px;padding:10px 13px;white-space:pre-line;line-height:1.6;background:#f7fbfd;}
  .given b{color:var(--ink);}
  .work{margin-top:18px;color:var(--mute);font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;}
  .ans{position:absolute;left:34px;right:34px;bottom:34px;}
  .ans .lab{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);}
  .ans .ln{border-bottom:1px solid var(--soft);height:22px;margin-top:6px;}
  .foot{position:absolute;left:34px;right:34px;bottom:12px;display:flex;justify-content:space-between;
        font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--mute);}
  @page{size:letter;margin:0.5in;}
  @media print{
    body{background:#fff;}
    .screen-only{display:none !important;}
    .wrap{max-width:none;padding:0;}
    #sheet{margin:0;}
    .page{border:none;border-radius:0;margin:0;min-height:9.3in;page-break-after:always;padding:14px 6px;}
    .page:last-child{page-break-after:auto;}
    html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="btn ghost" href="index.html" style="text-decoration:none;">&larr; Back to dashboard</a>
  
  <!-- ===== GATE ===== -->
  <div id="gate" class="card screen-only">
    <div class="kicker">Commonplace · Written Test</div>
    <h1>Worksheet Generator</h1>
    <p style="color:var(--soft)">Sign in with the same email you use across Commonplace — we'll send a magic link. Your session is shared with the other worksheet pages.</p>
    <div class="row">
      <div style="flex:2"><label>Email</label><input id="email" type="email" placeholder="you@example.com" style="width:100%"></div>
      <div style="flex:0"><button id="send-link" class="btn">Send magic link</button></div>
    </div>
    <div id="gate-msg" class="msg"></div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="hide">
    <div class="card screen-only" style="display:flex;align-items:center;gap:12px;">
      <div><div class="kicker">Signed in</div><b id="who">—</b></div>
      <button id="signout" class="btn ghost" style="margin-left:auto;">Sign out</button>
    </div>

    <!-- controls -->
    <div class="card screen-only">
      <div class="kicker" style="margin-bottom:10px;">Generate a batch</div>
      <div class="row">
        <div><label>Topic</label><select id="topic" style="width:100%"></select></div>
        <div><label>Batch</label>
          <select id="batch" style="width:100%">
            <option value="all">All problems</option>
            <option value="unseen">Unseen (not attempted)</option>
            <option value="weak">Weak spots (wrong / low rating)</option>
            <option value="fresh">Fresh random</option>
          </select>
        </div>
        <div style="flex:0;min-width:90px;"><label>Count</label><input id="count" type="number" value="5" min="1" max="50" style="width:90px"></div>
        <div style="flex:0"><button id="gen" class="btn">Generate</button></div>
        <div style="flex:0"><button id="print" class="btn ghost">Save as PDF</button></div>
      </div>
      <div id="gen-msg" class="msg"></div>
      <div id="progress" style="margin-top:10px;"></div>
    </div>

    <!-- record score -->
    <div class="card screen-only" id="score-card">
      <div class="kicker" style="margin-bottom:10px;">Record a score (after you solve by hand)</div>
      <div class="row">
        <div style="flex:2"><label>Problem</label><select id="s-problem" style="width:100%"></select></div>
        <div style="flex:0;min-width:120px;"><label>Result</label>
          <select id="s-correct" style="width:120px"><option value="true">Correct</option><option value="false">Wrong</option></select></div>
        <div style="flex:0;min-width:90px;"><label>Rating 1–5</label><input id="s-rating" type="number" min="1" max="5" value="3" style="width:90px"></div>
        <div style="flex:0;min-width:90px;"><label>Score</label><input id="s-score" type="number" step="0.5" placeholder="opt" style="width:90px"></div>
        <div style="flex:0;min-width:90px;"><label>Max</label><input id="s-max" type="number" step="0.5" placeholder="opt" style="width:90px"></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div style="flex:3"><label>Notes</label><input id="s-notes" type="text" placeholder="what to review" style="width:100%"></div>
        <div style="flex:0"><button id="s-save" class="btn">Save score</button></div>
      </div>
      <div id="score-msg" class="msg"></div>
    </div>

    <!-- worksheet output -->
    <div id="sheet"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wylxvmkcrexwfpjpbhyy.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let SESSION=null, TOPICS=[], CURRENT=[];   // CURRENT = rendered batch

// ---------- auth ----------
$("send-link").addEventListener("click", async () => {
  const email=$("email").value.trim(); const m=$("gate-msg");
  if(!email){m.className="msg err";m.textContent="Enter your email first.";return;}
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.href.split("#")[0]}});
  if(error){m.className="msg err";m.textContent=error.message;}
  else{m.className="msg ok";m.textContent="Check your inbox for the magic link, then return here.";}
});
$("email").addEventListener("keydown",(e)=>{if(e.key==="Enter")$("send-link").click();});
$("signout").addEventListener("click", async()=>{await sb.auth.signOut();location.reload();});

sb.auth.onAuthStateChange((_e,session)=>{ if(session && !SESSION){SESSION=session;onSignedIn();} });
sb.auth.getSession().then(({data})=>{ if(data.session){SESSION=data.session;onSignedIn();} });

async function onSignedIn(){
  $("gate").classList.add("hide"); $("app").classList.remove("hide");
  $("who").textContent = SESSION.user.email || SESSION.user.id;
  const {data:topics,error}=await sb.from("written_test_topics").select("*").order("branch_no");
  if(error){$("gen-msg").className="msg err";$("gen-msg").textContent="Load topics failed: "+error.message;return;}
  TOPICS=topics||[];
  $("topic").innerHTML=TOPICS.map(t=>`<option value="${esc(t.id)}">${esc(t.name||t.id)}</option>`).join("");
  showProgress();
}

// ---------- progress ----------
async function showProgress(){
  const tid=$("topic").value;
  const {data:atts}=await sb.from("written_test_attempts").select("problem_id,correct,topic_id").eq("topic_id",tid);
  const {count:total}=await sb.from("written_test_problems").select("*",{count:"exact",head:true}).eq("topic_id",tid);
  const attempted=new Set((atts||[]).map(a=>a.problem_id)).size;
  const correct=(atts||[]).filter(a=>a.correct).length;
  $("progress").innerHTML=`<span class="pill">bank: ${total||0}</span><span class="pill">attempted: ${attempted}</span><span class="pill">correct marks: ${correct}</span>`;
}
$("topic").addEventListener("change",showProgress);

// ---------- generate ----------
$("gen").addEventListener("click", generate);
async function generate(){
  const tid=$("topic").value, mode=$("batch").value, n=parseInt($("count").value)||5;
  const m=$("gen-msg"); m.className="msg"; m.textContent="Loading…";
  const {data:probs,error}=await sb.from("written_test_problems").select("*").eq("topic_id",tid).order("number");
  if(error){m.className="msg err";m.textContent=error.message;return;}
  let pool=probs||[];
  if(mode!=="all"){
    const {data:atts}=await sb.from("written_test_attempts").select("problem_id,correct,rating,graded_at").eq("topic_id",tid);
    const seen=new Set((atts||[]).map(a=>a.problem_id));
    const weak=new Set((atts||[]).filter(a=>a.correct===false||(a.rating!=null&&a.rating<=2)).map(a=>a.problem_id));
    if(mode==="unseen") pool=pool.filter(p=>!seen.has(p.id));
    else if(mode==="weak") pool=pool.filter(p=>weak.has(p.id));
    else if(mode==="fresh") pool=pool.map(p=>[Math.random(),p]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
  }
  pool=pool.slice(0,n);
  if(!pool.length){m.className="msg err";m.textContent="No problems match that batch (try 'All', or add more to the bank).";$("sheet").innerHTML="";return;}
  CURRENT=pool; render(pool); fillScoreSelect(pool);
  m.className="msg ok"; m.textContent=`Generated ${pool.length} problem(s). Click "Save as PDF" (or Ctrl/Cmd+P) to export.`;
}

function render(list){
  const topicName=(TOPICS.find(t=>t.id===list[0].topic_id)||{}).name||list[0].topic_id;
  $("sheet").innerHTML=list.map((p,i)=>{
    const given=p.given_data?`<div class="given"><b>GIVEN&nbsp;&nbsp;</b>${esc(p.given_data)}</div>`:"";
    return `<div class="page">
      <div class="ph"><span class="no">${String(i+1).padStart(2,"0")}</span>
        <span class="tag">${esc(topicName)}</span>
        <span class="sub">${esc(p.subtitle||"")}</span></div>
      <p class="prompt">${esc(p.prompt||"")}</p>
      ${given}
      <div class="work">work area — show every step</div>
      <div class="ans"><div class="lab">Answer</div><div class="ln"></div><div class="ln"></div></div>
      <div class="foot"><span>solve by hand · self-check with the answer key</span><span>${i+1} / ${list.length}</span></div>
    </div>`;
  }).join("");
}

// ---------- record score ----------
function fillScoreSelect(list){
  $("s-problem").innerHTML=list.map(p=>`<option value="${esc(p.id)}" data-topic="${esc(p.topic_id)}">№${p.number} · ${esc(p.subtitle||p.id)}</option>`).join("");
}
$("s-save").addEventListener("click", async()=>{
  const sel=$("s-problem"); const opt=sel.options[sel.selectedIndex]; const m=$("score-msg");
  if(!opt){m.className="msg err";m.textContent="Generate a batch first.";return;}
  const row={problem_id:opt.value,topic_id:opt.getAttribute("data-topic"),
    correct:$("s-correct").value==="true",rating:parseInt($("s-rating").value)||null,
    score:$("s-score").value?parseFloat($("s-score").value):null,
    max_score:$("s-max").value?parseFloat($("s-max").value):null,
    notes:$("s-notes").value||null,graded_by:"self",
    user_id:SESSION.user.id,graded_at:new Date().toISOString()};
  const {error}=await sb.from("written_test_attempts").insert(row);
  if(error){m.className="msg err";m.textContent="Save failed: "+error.message;}
  else{m.className="msg ok";m.textContent="Score saved to Supabase.";showProgress();}
});
</script>
</body>
</html>
